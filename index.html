<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON GUIDE — Tokyo Nightlife Intel</title>
<meta name="description" content="Community-powered Tokyo nightlife reviews, bar guides, club ratings, and safety tips for international travelers.">
<meta property="og:title" content="NEON GUIDE — Tokyo Nightlife Intel">
<meta property="og:description" content="Trusted reviews from real night owls. Bars, clubs, karaoke, late-night eats — all rated by travelers like you.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌃</text></svg>">
</head>
<body>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0
  }

  html, body {
    background: #0a0e1a;
    min-height: 100%;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
  }

  #ng-root {
    background: #0a0e1a;
    color: #e0e6f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    max-width: 100%;
    margin: 0 auto;
    overflow: hidden;
    border: 0.5px solid rgba(0, 255, 255, 0.15);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
  }

  .ng-head {
    padding: 14px 20px;
    border-bottom: 1px solid rgba(0, 229, 255, 0.12);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0
  }

  .ng-logo {
    font-size: 11px;
    font-weight: 500;
    color: #ff2d7c;
    letter-spacing: 2px
  }

  .ng-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-top: 1px
  }

  .ng-cyan {
    color: #00e5ff
  }

  .ng-pink {
    color: #ff2d7c
  }

  .ng-gold {
    color: #f5c518
  }

  .ng-muted {
    color: #8892a8
  }

  .ng-dim {
    color: #505a70
  }

  .ng-body {
    flex: 1;
    overflow-y: auto;
    background: #0a0e1a;
  }

  .ng-card {
    background: #131829;
    border-radius: 10px;
    border: 0.5px solid rgba(0, 229, 255, 0.1);
    margin: 12px 20px
  }

  .ng-card-head {
    padding: 10px 16px;
    background: rgba(0, 229, 255, 0.05);
    border-bottom: 0.5px solid rgba(0, 229, 255, 0.08);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #00e5ff
  }

  .ng-card-body {
    padding: 14px 16px
  }

  .ng-tag {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    display: inline-block;
    margin: 2px;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s
  }

  .ng-tag-cyan {
    background: rgba(0, 229, 255, 0.08);
    color: #00e5ff
  }

  .ng-tag-pink {
    background: rgba(255, 45, 124, 0.1);
    color: #ff2d7c
  }

  .ng-tag-purple {
    background: rgba(138, 43, 226, 0.12);
    color: #b47aff
  }

  .ng-tag-orange {
    background: rgba(255, 165, 0, 0.12);
    color: #ffa500
  }

  .ng-tag-green {
    background: rgba(0, 200, 83, 0.12);
    color: #00c853
  }

  .ng-tag-off {
    background: #1a2038;
    color: #8892a8
  }

  .ng-tag-off:hover {
    background: #222a45
  }

  .ng-badge {
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    display: inline-block
  }

  .ng-btn {
    background: #00e5ff;
    color: #0a0e1a;
    text-align: center;
    padding: 10px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: opacity 0.15s
  }

  .ng-btn:hover {
    opacity: 0.85
  }

  .ng-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed
  }

  .ng-btn-sm {
    background: #00e5ff;
    color: #0a0e1a;
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: inherit
  }

  .ng-btn-ghost {
    background: transparent;
    border: 0.5px solid rgba(0, 229, 255, 0.25);
    color: #00e5ff;
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit
  }

  .ng-btn-ghost:hover {
    background: rgba(0, 229, 255, 0.08)
  }

  .ng-input,
  .ng-textarea {
    background: #0d1224;
    border: 0.5px solid rgba(0, 229, 255, 0.15);
    border-radius: 6px;
    padding: 10px 12px;
    color: #e0e6f0;
    font-size: 13px;
    width: 100%;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s
  }

  .ng-input:focus,
  .ng-textarea:focus {
    border-color: #00e5ff
  }

  .ng-input::placeholder,
  .ng-textarea::placeholder {
    color: #505a70
  }

  .ng-textarea {
    min-height: 80px;
    resize: vertical
  }

  .ng-select {
    background: #0d1224;
    border: 0.5px solid rgba(0, 229, 255, 0.15);
    border-radius: 6px;
    padding: 8px 12px;
    color: #e0e6f0;
    font-size: 13px;
    font-family: inherit;
    outline: none
  }

  .ng-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #1a2038;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0
  }

  .ng-avatar-sm {
    width: 24px;
    height: 24px;
    font-size: 10px
  }

  .ng-stars {
    color: #f5c518;
    font-size: 13px;
    letter-spacing: 1px
  }

  .ng-bar {
    height: 6px;
    background: #1a2038;
    border-radius: 3px;
    overflow: hidden;
    flex: 1
  }

  .ng-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: #00e5ff;
    transition: width 0.3s
  }

  .ng-nav {
    padding: 10px 20px;
    border-top: 1px solid rgba(0, 229, 255, 0.08);
    display: flex;
    justify-content: space-around;
    background: #0a0e1a;
    flex-shrink: 0
  }

  .ng-nav-item {
    text-align: center;
    font-size: 11px;
    color: #8892a8;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: color 0.15s;
    flex: 1
  }

  .ng-nav-item:hover {
    color: #e0e6f0
  }

  .ng-nav-item.active {
    color: #00e5ff
  }

  .ng-nav-icon {
    font-size: 16px;
    display: block;
    margin-bottom: 2px
  }

  .ng-comment {
    padding: 12px;
    background: #0d1224;
    border-radius: 8px;
    margin-bottom: 8px
  }

  .ng-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid rgba(0, 229, 255, 0.08);
    padding: 0 20px;
    overflow-x: auto
  }

  .ng-tab {
    padding: 10px 14px;
    font-size: 12px;
    color: #8892a8;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    font-weight: 500;
    white-space: nowrap;
    transition: color 0.15s
  }

  .ng-tab:hover {
    color: #e0e6f0
  }

  .ng-tab.active {
    color: #00e5ff;
    border-bottom-color: #00e5ff
  }

  .ng-star-btn {
    width: 36px;
    height: 36px;
    background: #1a2038;
    border: 0.5px solid rgba(0, 229, 255, 0.15);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    color: #505a70;
    transition: all 0.15s
  }

  .ng-star-btn.selected {
    background: rgba(245, 197, 24, 0.15);
    border-color: #f5c518;
    color: #f5c518
  }

  .ng-star-btn:hover {
    border-color: #f5c518
  }

  .ng-spot-card {
    background: #131829;
    border-radius: 10px;
    border: 0.5px solid rgba(0, 229, 255, 0.1);
    padding: 14px 16px;
    margin: 0 20px 12px;
    cursor: pointer;
    transition: border-color 0.15s
  }

  .ng-spot-card:hover {
    border-color: rgba(0, 229, 255, 0.35)
  }

  .ng-back {
    font-size: 12px;
    color: #8892a8;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 6px
  }

  .ng-back:hover {
    color: #00e5ff;
    background: rgba(0, 229, 255, 0.05)
  }

  .ng-liked {
    color: #ff2d7c !important
  }

  .ng-joined {
    background: rgba(0, 200, 83, 0.15) !important;
    color: #00c853 !important
  }

  .ng-toast {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: #131829;
    border: 0.5px solid #00e5ff;
    color: #00e5ff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 100;
    pointer-events: none
  }

  .ng-toast.show {
    opacity: 1
  }

  .ng-hidden {
    display: none !important
  }

  .ng-pill {
    background: #00e5ff;
    color: #0a0e1a;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: inherit
  }

  .ng-screen {
    animation: fadeIn 0.2s ease-out;
    min-height: 100%;
    background: #0a0e1a;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(4px)
    }

    to {
      opacity: 1;
      transform: none
    }
  }

  /* ============ HERO ============ */
  .ng-hero {
    position: relative;
    width: 100%;
    height: 180px;
    overflow: hidden;
    flex-shrink: 0;
    background: #0a0e1a;
    border-bottom: 1px solid rgba(0, 229, 255, 0.12);
  }

  .ng-hero-img {
    position: absolute;
    inset: 0;
    background-image: url('img/hero.jpg');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
  }

  .ng-hero-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 16px 20px;
    background:
      linear-gradient(180deg, rgba(10, 14, 26, 0.55) 0%, rgba(10, 14, 26, 0.3) 40%, rgba(10, 14, 26, 0.85) 100%);
  }

  .ng-hero-sub {
    font-size: 11px;
    color: #00e5ff;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 8px;
    text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
  }

  .ng-hero-title {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
  }

  .ng-hero.hidden {
    display: none;
  }

  /* ============ RESPONSIVE — SP ============ */
  @media (max-width: 600px) {
    .ng-head {
      padding: 12px 14px;
    }

    .ng-logo {
      font-size: 10px;
      letter-spacing: 1.5px;
    }

    .ng-title {
      font-size: 15px;
      letter-spacing: 0.5px;
    }

    .ng-hero {
      height: 140px;
    }

    .ng-hero-sub {
      font-size: 10px;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }

    .ng-hero-title {
      font-size: 17px;
      line-height: 1.25;
    }

    .ng-card {
      margin: 10px 14px;
    }

    .ng-spot-card {
      margin: 0 14px 10px;
      padding: 12px 14px;
    }

    .ng-tabs {
      padding: 0 14px;
    }

    .ng-tab {
      padding: 9px 10px;
      font-size: 11px;
    }

    .ng-nav {
      padding: 8px 10px;
    }

    .ng-nav-item {
      font-size: 10px;
      padding: 3px 4px;
    }

    .ng-nav-icon {
      font-size: 14px;
    }

    /* Screen padding overrides via inline style handled by selector */
    .ng-screen {
      /* content padding is inline in many places; we rely on cards/margins above */
    }

    /* shrink inline padded screens */
    .ng-screen[style*="padding:16px 20px"] {
      padding: 12px 14px !important;
    }

    .ng-screen[style*="padding:60px 20px"] {
      padding: 40px 14px !important;
    }

    #ng-head-action input[type="text"] {
      width: 100px !important;
      font-size: 11px !important;
    }
  }

  @media (max-width: 400px) {
    .ng-hero {
      height: 120px;
    }

    .ng-hero-title {
      font-size: 15px;
    }

    .ng-title {
      font-size: 13px;
    }

    #ng-head-action .ng-pill {
      font-size: 11px;
      padding: 5px 10px;
    }

    #ng-head-action input[type="text"] {
      display: none;
    }
  }


  /* ============ SPOT ACCOUNT IMAGE ============ */
  .ng-spot-banner {
    width: 100%; aspect-ratio: 16/9; height: auto; overflow: hidden;
    background: linear-gradient(135deg, #1a2038, #131829);
    display: flex; align-items: center; justify-content: center;
    font-size: 48px; position: relative;
    border-radius: 10px 10px 0 0;
  }
  .ng-spot-banner img { width: 100%; height: 100%; object-fit: cover; }
  .ng-spot-banner-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(0deg, rgba(19,24,41,0.85) 0%, transparent 50%);
  }
  .ng-spot-banner-name {
    position: absolute; bottom: 10px; left: 12px; right: 80px;
    font-size: 16px; font-weight: 700; color: #fff;
    text-shadow: 0 1px 6px rgba(0,0,0,0.7);
    z-index: 1;
  }
  .ng-spot-banner-rating {
    position: absolute; bottom: 8px; right: 12px;
    text-align: center; z-index: 1;
  }
  .ng-spot-detail-banner {
    width: 100%; aspect-ratio: 16/9; height: auto; max-height: 240px; overflow: hidden;
    background: linear-gradient(135deg, #1a2038, #0d1224);
    display: flex; align-items: center; justify-content: center;
    font-size: 64px; margin-bottom: 14px; position: relative;
    border-radius: 10px;
  }
  .ng-spot-detail-banner img { width: 100%; height: 100%; object-fit: cover; }
  .ng-spot-detail-banner-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(0deg, rgba(10,14,26,0.7) 0%, transparent 40%);
    border-radius: 10px;
  }

  /* ============ STAFF HORIZONTAL SCROLL ============ */
  .ng-staff-scroll {
    display: flex; gap: 12px; overflow-x: auto; padding: 0 20px 12px;
    scrollbar-width: none; -ms-overflow-style: none;
  }
  .ng-staff-scroll::-webkit-scrollbar { display: none; }
  .ng-staff-scroll-item {
    flex-shrink: 0; width: 80px; text-align: center; cursor: pointer;
    transition: transform 0.15s;
  }
  .ng-staff-scroll-item:hover { transform: translateY(-2px); }
  .ng-staff-scroll-avatar {
    width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 6px;
    background: linear-gradient(135deg, #1a2038, #131829);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; position: relative; overflow: hidden;
    border: 2px solid rgba(0,229,255,0.2);
  }
  .ng-staff-scroll-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .ng-staff-scroll-avatar.has-new { border-color: #ff2d7c; }
  .ng-staff-scroll-new {
    position: absolute; bottom: -2px; right: -2px;
    background: #ff2d7c; color: #fff; font-size: 8px; font-weight: 700;
    padding: 1px 4px; border-radius: 4px;
  }
  .ng-staff-scroll-name { font-size: 11px; font-weight: 500; color: #e0e6f0; line-height: 1.2; }
  .ng-staff-scroll-role { font-size: 9px; color: #8892a8; margin-top: 2px; }
  .ng-staff-scroll-shop { font-size: 9px; color: #ff2d7c; margin-top: 1px; }

  @media (max-width: 600px) {
    .ng-spot-banner { font-size: 36px; }
    .ng-spot-banner-name { font-size: 14px; }
    .ng-spot-detail-banner { max-height: 180px; font-size: 48px; }
    .ng-staff-scroll { gap: 10px; padding: 0 14px 10px; }
    .ng-staff-scroll-item { width: 72px; }
    .ng-staff-scroll-avatar { width: 56px; height: 56px; font-size: 24px; }
  }

  /* ============ ADMIN PANEL ============ */
  .ng-admin-section { margin-bottom: 20px; }
  .ng-admin-section-title {
    font-size: 12px; font-weight: 600; color: #ff2d7c; letter-spacing: 1px;
    margin-bottom: 10px; text-transform: uppercase;
  }
  .ng-admin-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-end; }
  .ng-admin-row > div { flex: 1; }
  .ng-admin-row label { display: block; font-size: 10px; color: #505a70; margin-bottom: 3px; }
  .ng-admin-mini-card {
    background: #131829; border-radius: 6px; padding: 8px 10px;
    border: 0.5px solid rgba(0,229,255,0.08); margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px; font-size: 12px;
  }
  .ng-admin-del {
    color: #ff2d7c; cursor: pointer; font-size: 10px; margin-left: auto;
    padding: 2px 6px; border-radius: 4px;
  }
  .ng-admin-del:hover { background: rgba(255,45,124,0.1); }

  /* ============ PROMOTED / SHOP ============ */
  .ng-promo-card {
    background: #131829;
    border-radius: 10px;
    border: 1px solid rgba(255, 45, 124, 0.25);
    margin: 0 20px 12px;
    cursor: pointer;
    transition: border-color 0.15s;
    overflow: hidden;
    position: relative;
  }
  .ng-promo-card:hover { border-color: rgba(255, 45, 124, 0.5); }
  .ng-promo-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, #ff2d7c, #b47aff, #00e5ff);
  }
  .ng-promo-banner {
    height: 100px;
    background: linear-gradient(135deg, #1a1040 0%, #0d1224 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #505a70;
    position: relative;
    overflow: hidden;
  }
  .ng-promo-banner-glow {
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.3;
  }
  .ng-official-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: linear-gradient(135deg, rgba(255,45,124,0.15), rgba(180,122,255,0.15));
    color: #ff2d7c;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    border: 0.5px solid rgba(255, 45, 124, 0.25);
  }
  .ng-pr-label {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(10, 14, 26, 0.7);
    color: #8892a8;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.5px;
    backdrop-filter: blur(4px);
  }
  .ng-staff-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  @media (max-width: 600px) {
    .ng-staff-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .ng-promo-banner { height: 80px; }
    .ng-promo-card { margin: 0 14px 10px; }
  }
  @media (max-width: 400px) {
    .ng-staff-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .ng-promo-banner { height: 70px; }
  }
  .ng-staff-card {
    background: #0d1224;
    border-radius: 8px;
    border: 0.5px solid rgba(0, 229, 255, 0.08);
    overflow: hidden;
    transition: border-color 0.15s;
    cursor: pointer;
  }
  .ng-staff-card:hover { border-color: rgba(0, 229, 255, 0.3); }
  .ng-staff-photo {
    width: 100%;
    aspect-ratio: 2/3;
    background: linear-gradient(135deg, #1a2038 0%, #131829 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: #505a70;
    position: relative;
  }
  .ng-staff-new {
    position: absolute;
    top: 6px; left: 6px;
    background: #ff2d7c;
    color: #fff;
    font-size: 9px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 3px;
  }
  .ng-staff-photo img { width: 100%; height: 100%; object-fit: cover; }
  .ng-staff-info {
    padding: 8px 10px;
  }
  .ng-event-card {
    background: #0d1224;
    border-radius: 8px;

              <div style="display:flex;align-items:center;justify-content:space-between;">

        </div>

        <div style="margin-bottom:12px;">
          <div style="font-size:11px;color:#8892a8;margin-bottom:6px;font-weight:500;letter-spacing:0.5px;">YOUR REVIEW</div>
          <textarea class="ng-textarea" data-action="form-body" placeholder="Share your experience — What did you love? What should others know?">${esc(f.body)}</textarea>

        ${t.joining > 0 ? `<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:10px;background:#131829;border-radius:8px;">

          <span style="color:#8892a8;">💬 ${t.comments.length} comments</span>
          <span style="color:#8892a8;">🔖 Save</span>
        </div>

        <div style="font-size:13px;font-weight:600;margin-bottom:10px;">Comments (${t.comments.length})</div>

              <div class="ng-avatar ng-avatar-sm" style="color:${c.color};">${c.initials}</div>

            <div style="font-size:11px;color:#505a70;margin-top:6px;">▲ ${c.helpful}</div>

    function renderNav() {
      const items = [
        ['feed', '🏠', 'Feed'], ['reviews', '⭐', 'Reviews'], ['board', '💬', 'Board'], ['map', '🗺', 'Map'], ['admin', '⚙', 'Admin']
      ];
      const activeScreen = ['feed', 'spot', 'reviewForm', 'shopDetail'].includes(state.screen) ? 'feed'
        : state.screen === 'admin' ? 'admin'
        : ['board', 'thread', 'newThread'].includes(state.screen) ? 'board'
          : state.screen;
      return items.map(([k, i, l]) => `<div class="ng-nav-item ${k === activeScreen ? 'active' : ''}" data-action="nav" data-val="${k}"><span class="ng-nav-icon">${i}</span>${l}</div>`).join('');
    }

    function renderHeader() {
      const titles = {
        feed: 'TOKYO <span class="ng-cyan">//</span> LIVE INTEL',
        spot: 'SPOT <span class="ng-cyan">//</span> DETAIL',
        reviewForm: 'WRITE <span class="ng-cyan">//</span> REVIEW',
        board: 'TOKYO <span class="ng-cyan">//</span> BOARD',
        thread: 'BOARD <span class="ng-cyan">//</span> THREAD',
        newThread: 'NEW <span class="ng-cyan">//</span> POST',
        map: 'TOKYO <span class="ng-cyan">//</span> MAP',
        profile: 'YOU <span class="ng-cyan">//</span> PROFILE',
        reviews: 'ALL <span class="ng-cyan">//</span> REVIEWS',
        shopDetail: 'SHOP <span class="ng-cyan">//</span> OFFICIAL',
        admin: 'TEST <span class="ng-cyan">//</span> ADMIN'
      };
      $('ng-screen-title').innerHTML = titles[state.screen] || titles.feed;

      let action = '';
      if (['spot', 'reviewForm', 'thread', 'newThread', 'shopDetail', 'admin'].includes(state.screen)) {
        action = `<button class="ng-back" data-action="back">← Back</button>`;
      } else if (state.screen === 'feed') {
        action = `<input type="text" class="ng-input" placeholder="Search..." style="width:140px;padding:6px 10px;font-size:12px;" />`;
      } else if (state.screen === 'board') {
        action = `<button class="ng-pill" data-action="open-new-thread">+ New post</button>`;
      }
      $('ng-head-action').innerHTML = action;
    }

    function renderPlaceholder(msg) {
      return `<div class="ng-screen" style="padding:60px 20px;text-align:center;">
      <div style="font-size:48px;margin-bottom:12px;opacity:0.5;">${msg.icon}</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:6px;">${msg.title}</div>
      <div style="font-size:12px;color:#505a70;">${msg.sub}</div>
    </div>`;
    }

    function render() {
      renderHeader();
      // Show hero only on feed screen
      const hero = $('ng-hero');
      if (hero) {
        if (state.screen === 'feed') hero.classList.remove('hidden');
        else hero.classList.add('hidden');
      }
      let html = '';
      switch (state.screen) {
        case 'feed': html = renderFeed(); break;
        case 'spot': html = renderSpotDetail(); break;
        case 'reviewForm': html = renderReviewForm(); break;
        case 'board': html = renderBoard(); break;
        case 'thread': html = renderThreadDetail(); break;
        case 'newThread': html = renderNewThread(); break;
        case 'shopDetail': html = renderShopDetail(); break;
        case 'reviews': html = renderPlaceholder({ icon: '⭐', title: 'All Reviews', sub: 'Coming soon — browse reviews across all spots' }); break;
        case 'map': html = renderPlaceholder({ icon: '🗺', title: 'Map View', sub: 'Coming soon — see all spots plotted on Tokyo map' }); break;
        case 'admin': html = renderAdmin(); break;
      }
      $('ng-body').innerHTML = html;
      $('ng-nav').innerHTML = renderNav();
    }

    // ============ EVENT HANDLING ============
    document.addEventListener('click', e => {
      const el = e.target.closest('[data-action]');
      if (!el || !document.getElementById('ng-root').contains(el)) return;
      const a = el.dataset.action;
      const val = el.dataset.val;
      const id = el.dataset.id ? parseInt(el.dataset.id) : null;

      if (el.dataset.stop) e.stopPropagation();

      switch (a) {
        case 'nav':
          if (val === 'feed') navigate('feed');
          else if (val === 'board') navigate('board');
          else navigate(val);
          break;
        case 'back':
          if (state.screen === 'spot' || state.screen === 'reviewForm' || state.screen === 'shopDetail' || state.screen === 'admin') navigate('feed');
          else if (state.screen === 'thread' || state.screen === 'newThread') navigate('board');
          break;
        case 'feed-tab': state.feedTab = val; render(); break;
        case 'board-tab': state.boardTab = val; render(); break;
        case 'open-spot': navigate('spot', { currentSpotId: id }); break;
        case 'open-thread': navigate('thread', { currentThreadId: id }); break;
        case 'open-shop': navigate('shopDetail', { currentShopId: id, shopTab: 'about' }); break;
        case 'shop-tab': state.shopTab = val; render(); break;
        case 'open-review-form-shop':
          state.form = { rating: 0, spotId: id, tags: [], price: '', body: '', title: '', cats: { music: 0, vibe: 0, value: 0, safety: 0, english: 0 } };
          navigate('reviewForm');
          break;
        case 'open-review-form':
          state.form = { rating: 0, spotId: state.currentSpotId || 1, tags: [], price: '', body: '', title: '', cats: { music: 0, vibe: 0, value: 0, safety: 0, english: 0 } };
          navigate('reviewForm');
          break;
        case 'open-new-thread':
          state.threadForm = { title: '', body: '', category: 'lfg' };
          navigate('newThread');
          break;
        case 'form-rating': state.form.rating = parseInt(val); render(); break;
        case 'form-cat': state.form.cats[el.dataset.cat] = parseInt(val); render(); break;
        case 'form-tag':
          const tg = val; const i = state.form.tags.indexOf(tg);
          if (i >= 0) state.form.tags.splice(i, 1); else state.form.tags.push(tg);
          render(); break;
        case 'form-price': state.form.price = val; render(); break;
        case 'thread-cat': state.threadForm.category = val; render(); break;
        case 'like-review':
          userState.likedReviews[id] = !userState.likedReviews[id];
          toast(userState.likedReviews[id] ? 'Marked as helpful' : 'Removed');
          render(); break;
        case 'like-thread':
          userState.likedThreads[id] = !userState.likedThreads[id];
          toast(userState.likedThreads[id] ? 'Upvoted' : 'Removed');
          render(); break;
        case 'join-thread':
          if (userState.joinedThreads[id]) {
            userState.joinedThreads[id] = false; toast('Left the group');
          } else {
            userState.joinedThreads[id] = true; toast('You joined the plan!');
          }
          render(); break;
        case 'submit-review':
          const sp = spots.find(x => x.id === state.form.spotId);
          reviews.unshift({ id: Date.now(), spotId: state.form.spotId, user: 'You', initials: 'U', color: '#00e5ff', level: 1, rating: state.form.rating, text: state.form.body, tags: state.form.tags.slice(0, 3), helpful: 0, replies: 0, time: 'just now' });
          sp.reviewCount++;
          toast('Review posted! 🎉');
          navigate('spot', { currentSpotId: state.form.spotId });
          break;
        case 'submit-thread':
          const newId = Date.now();
          threads.splice(1, 0, { id: newId, category: state.threadForm.category, title: state.threadForm.title, author: 'You', initials: 'U', color: '#00e5ff', level: 1, district: 'General', time: 'just now', body: state.threadForm.body, comments: [], likes: 0, joining: state.threadForm.category === 'lfg' ? 1 : 0 });
          if (state.threadForm.category === 'lfg') userState.joinedThreads[newId] = true;
          toast('Thread posted! 🎉');
          navigate('thread', { currentThreadId: newId });
          break;
        case 'adm-add-spot': {
          const n = document.getElementById('adm-spot-name');
          if (!n || !n.value.trim()) { toast('Enter a spot name'); break; }
          const newSpot = {
            id: Date.now(),
            name: n.value.trim(),
            type: document.getElementById('adm-spot-type').value,
            district: document.getElementById('adm-spot-district').value,
            price: document.getElementById('adm-spot-price').value || '¥???',
            hours: document.getElementById('adm-spot-hours').value || 'TBD',
            rating: 0, reviewCount: 0,
            icon: document.getElementById('adm-spot-icon').value || '🏠',
            img: document.getElementById('adm-spot-img').value || '',
            tags: (document.getElementById('adm-spot-tags').value || '').split(',').map(t => t.trim()).filter(Boolean),
            cats: { music: 0, vibe: 0, value: 0, safety: 0, english: 0 },
            dist: { 5: 0, 4: 0, 3: 0, 2: 0, 1: 0 }
          };
          spots.push(newSpot);
          toast('Spot added: ' + newSpot.name);
          render();
          break;
        }
        case 'adm-del-spot': {
          const idx = spots.findIndex(s => s.id === id);
          if (idx >= 0) { spots.splice(idx, 1); toast('Spot removed'); render(); }
          break;
        }
        case 'adm-add-staff': {
          const shopId = parseInt(document.getElementById('adm-staff-shop').value);
          const shop = shops.find(s => s.id === shopId);
          const sn = document.getElementById('adm-staff-name');
          if (!shop || !sn || !sn.value.trim()) { toast('Select shop and enter name'); break; }
          shop.staff.push({
            name: sn.value.trim(),
            role: document.getElementById('adm-staff-role').value || 'Staff',
            emoji: document.getElementById('adm-staff-emoji').value || '🙂',
            desc: document.getElementById('adm-staff-desc').value || '',
            isNew: document.getElementById('adm-staff-new').checked,
            schedule: document.getElementById('adm-staff-sched').value || 'TBD'
          });
          toast('Staff added to ' + shop.name);
          render();
          break;
        }
        case 'adm-del-staff': {
          const shopId2 = parseInt(el.dataset.id);
          const sIdx = parseInt(el.dataset.idx);
          const shop2 = shops.find(s => s.id === shopId2);
          if (shop2 && sIdx >= 0) { shop2.staff.splice(sIdx, 1); toast('Staff removed'); render(); }
          break;
        }
        case 'submit-comment':
          const th = threads.find(x => x.id === id);
          const draft = state.commentForm[id];
          if (th && draft && draft.trim().length >= 3) {
            th.comments.push({ user: 'You', initials: 'U', color: '#00e5ff', level: 1, text: draft.trim(), helpful: 0, time: 'just now' });
            state.commentForm[id] = '';
            toast('Comment posted!');
            render();
          }
          break;
      }
    });

    document.addEventListener('input', e => {
      const el = e.target.closest('[data-action]');
      if (!el || !document.getElementById('ng-root').contains(el)) return;
      const a = el.dataset.action;
      if (a === 'form-title') { state.form.title = el.value; const hint = document.querySelector('[data-action="submit-review"]'); /* no rerender needed */ }
      else if (a === 'form-body') {
        state.form.body = el.value;
        // Update counter + submit button live
        const counter = el.parentElement.querySelector('div');
        if (counter) { counter.textContent = el.value.length + '/20 chars min'; counter.style.color = el.value.length >= 20 ? '#00c853' : '#505a70'; }
        const btn = document.querySelector('[data-action="submit-review"]');
        if (btn) { btn.disabled = !(state.form.rating > 0 && el.value.length >= 20); }
      }
      else if (a === 'thread-title') {
        state.threadForm.title = el.value;
        const btn = document.querySelector('[data-action="submit-thread"]');
        if (btn) btn.disabled = !(el.value.length >= 5 && state.threadForm.body.length >= 20);
      }
      else if (a === 'thread-body') {
        state.threadForm.body = el.value;
        const counter = el.parentElement.querySelector('div:last-child');
        if (counter) { counter.textContent = el.value.length + '/20 chars min'; counter.style.color = el.value.length >= 20 ? '#00c853' : '#505a70'; }
        const btn = document.querySelector('[data-action="submit-thread"]');
        if (btn) btn.disabled = !(state.threadForm.title.length >= 5 && el.value.length >= 20);
      }
      else if (a === 'comment-body') {
        const tid = parseInt(el.dataset.thread);
        state.commentForm[tid] = el.value;
        const btn = document.querySelector(`[data-action="submit-comment"][data-id="${tid}"]`);
        if (btn) {
          const ok = el.value.trim().length >= 3;
          btn.disabled = !ok;
          btn.style.opacity = ok ? '1' : '0.4';
        }
      }
    });

    document.addEventListener('change', e => {
      const el = e.target.closest('[data-action]');
      if (!el || !document.getElementById('ng-root').contains(el)) return;
      if (el.dataset.action === 'form-spot') { state.form.spotId = parseInt(el.value); render(); }
    });

    render();
  })();
</script>
</body>
</html>
